name: mithril-forge-e2e
services:
  postgres:
    image: "postgres:latest"
    environment:
      - "POSTGRES_DB=e2edatabase"
      - "POSTGRES_PASSWORD=secret"
      - "POSTGRES_USER=myuser"
    ports:
      - "5433:5432"

  mailpit:
    image: axllent/mailpit
    ports:
      - "8026:8025" # Web UI
      - "1026:1025" # SMTP Port
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
