spring:
  application:
    name: mithril-forge
  session:
    jdbc:
      initialize-schema: always
  docker:
    compose:
      file: ../compose.yaml        # compose.yaml liegt im Root, Backend ist Unterordner
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
  devtools:
    restart:
      exclude: static/**           # kein Restart-Loop wenn Frontend-Build static/ befüllt

sentry:
  enabled: false                   # kein DSN konfiguriert, Sentry im Dev stumm schalten

server:
  port: 8080
