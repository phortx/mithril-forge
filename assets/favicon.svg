<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Ember Spark Gradients -->
    <linearGradient id="emberDark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d1414" />
      <stop offset="50%" stop-color="#8b2525" />
      <stop offset="100%" stop-color="#c45a2d" />
    </linearGradient>
    <linearGradient id="ember" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b2525" />
      <stop offset="50%" stop-color="#c45a2d" />
      <stop offset="100%" stop-color="#e4c65a" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e4c65a" />
      <stop offset="50%" stop-color="#c9a84c" />
      <stop offset="100%" stop-color="#8a7235" />
    </linearGradient>
  </defs>

  <!-- Floating Sparks -->
  <circle cx="15" cy="20" r="4" fill="#e4c65a" opacity="0.8" />
  <circle cx="85" cy="30" r="6" fill="#c45a2d" opacity="0.8" />
  <circle cx="25" cy="80" r="3" fill="#d97044" opacity="0.8" />
  <circle cx="80" cy="80" r="4" fill="#e4c65a" opacity="0.8" />

  <!-- Base Ember Diamond -->
  <path d="M 50 5 L 85 50 L 50 95 L 15 50 Z" fill="url(#emberDark)" opacity="0.9" />
  
  <!-- Mid Ember Diamond -->
  <path d="M 50 15 L 75 50 L 50 85 L 25 50 Z" fill="url(#ember)" />
  
  <!-- Bright Gold Diamond -->
  <path d="M 50 28 L 65 50 L 50 72 L 35 50 Z" fill="url(#gold)" />
  
  <!-- White Hot Core -->
  <path d="M 50 38 L 56 50 L 50 62 L 44 50 Z" fill="#ffffff" />
</svg>
